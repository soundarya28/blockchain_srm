<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Certificate Verification</title>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #4a4a4a;
            margin-bottom: 25px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            background: #f8f9ff;
            border-left: 6px solid #667eea;
            line-height: 1.8;
            font-size: 17px;
        }

        .success {
            color: #155724;
            background: #d4edda;
            border-left-color: #28a745 !important;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🎓 Certificate Verification</h1>
        <p>Secure Blockchain-Based Certificate Management System</p>
    </div>

    <div class="card">
        <h2>Add Certificate</h2>

        <input id="name" placeholder="Student Name">
        <input id="course" placeholder="Course Name">
        <input id="certId" placeholder="Certificate ID">
        <input id="hash" placeholder="Certificate Hash">

        <button onclick="addCertificate()">Add Certificate</button>
    </div>

    <div class="card">
        <h2>Verify Certificate</h2>

        <input id="verifyId" placeholder="Enter Certificate ID">

        <button onclick="verifyCertificate()">Verify Certificate</button>

        <div id="result"></div>
    </div>

    <div class="footer">
        Powered by Ethereum Blockchain
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
